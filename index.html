<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Music - Evolve Your Sound</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6', 600: '#7c3aed', 900: '#4c1d95' },
                        dark: { 900: '#09090b', 800: '#18181b', 700: '#27272a' },
                        glass: 'rgba(24, 24, 27, 0.65)'
                    },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': { opacity: 1, transform: 'scale(1)' },
                            '50%': { opacity: .7, transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #09090b;
            color: #ffffff;
            overflow: hidden; /* Prevent body scroll, handle internally */
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(39, 39, 42, 0.6) 0%, rgba(24, 24, 27, 0.3) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.3);
        }

        /* Range Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px; width: 12px;
            border-radius: 50%;
            background: #8b5cf6;
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.8);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: #3f3f46;
            border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }

        /* Dynamic Background Glow */
        #bg-glow {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, var(--glow-color, rgba(139, 92, 246, 0.15)) 0%, transparent 70%);
            z-index: -1;
            transition: background 1s ease;
        }

        /* Mobile Player Transition */
        #player-container {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (max-width: 768px) {
            #player-container.full-screen {
                height: 100dvh;
                padding-bottom: 20px;
                border-radius: 0;
                background: #09090b;
                z-index: 50;
            }
            #player-container.full-screen .mobile-hidden { display: flex !important; }
            #player-container.full-screen .mini-hidden { display: none !important; }
            #player-container.full-screen #cover-art { 
                width: 250px; height: 250px; margin: 40px auto; border-radius: 20px;
                box-shadow: 0 20px 50px -15px var(--glow-color, rgba(0,0,0,0.5));
            }
            #player-container.full-screen #song-info-container { flex-direction: column; text-align: center; gap: 10px;}
        }

        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-100 flex h-screen antialiased select-none">

        // --- Authentication Flow ---
        els.toggleAuthBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-submit').innerText = isLoginMode ? 'Sign In' : 'Sign Up';
            els.toggleAuthBtn.innerText = isLoginMode ? 'Need an account? Sign Up' : 'Already have an account? Sign In';
            els.authError.classList.add('hidden');
        });

        els.authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            els.authError.classList.add('hidden');

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(cred.user);
                    alert("Account created! Please check your email for a verification link.");
                }
            } catch (err) {
                showAuthError(err.message);
            }
        });

        els.googleBtn.addEventListener('click', async () => {
            els.authError.classList.add('hidden');
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                showAuthError("Google Sign-In failed. Make sure your domain is authorized in Firebase Console.");
                console.error(err);
            }
        });

        function showAuthError(msg) {
            els.authError.innerText = msg;
            els.authError.classList.remove('hidden');
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                AppState.user = user;
                els.authScreen.classList.add('hidden');
                els.mainApp.classList.remove('hidden');
                
                // Update UI User info
                document.getElementById('user-name').innerText = user.displayName || user.email.split('@')[0];
                document.getElementById('user-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}&background=random`;
                document.getElementById('mobile-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}&background=random`;

                await loadUserData();
                loadTrendingData(); // Global listener
                navigate('home');
            } else {
                AppState.user = null;
                els.authScreen.classList.remove('hidden');
                els.mainApp.classList.add('hidden');
                els.playerContainer.classList.add('hidden');
                AppState.audio.pause();
            }
        });

        // --- Data Fetching (Strict Firebase Paths as Requested) ---
        let trendingUnsubscribe = null;
        let userUnsubscribe = null;

        async function loadUserData() {
            if (!AppState.user) return;
            const uid = AppState.user.uid;
            const userRef = doc(db, 'artifacts', AppID, 'users', uid, 'profile', 'data');
            
            userUnsubscribe = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    AppState.favorites = data.favorites || [];
                    AppState.playlists = data.playlists || [];
                } else {
                    // Initialize empty
                    setDoc(userRef, { favorites: [], playlists: [] });
                }
                renderSidebarPlaylists();
                if(AppState.currentView === 'favorites' || AppState.currentView.startsWith('playlist')) navigate(AppState.currentView);
                updateLikeButtonUI();
            }, (error) => console.error("Error loading user data:", error));
        }

        function loadTrendingData() {
            const trendingRef = doc(db, 'artifacts', AppID, 'public', 'data', 'stats', 'global');
            trendingUnsubscribe = onSnapshot(trendingRef, (docSnap) => {
                if (docSnap.exists()) {
                    AppState.trendingStats = docSnap.data().playCounts || {};
                }
                if(AppState.currentView === 'home') renderHome();
            }, (error) => console.error("Error loading trending data:", error));
        }

        async function saveUserData() {
            if (!AppState.user) return;
            const userRef = doc(db, 'artifacts', AppID, 'users', AppState.user.uid, 'profile', 'data');
            await setDoc(userRef, {
                favorites: AppState.favorites,
                playlists: AppState.playlists
            }, { merge: true });
        }

        async function recordPlay(songId) {
            if (!AppState.user) return;
            // Update global trending stats
            const trendingRef = doc(db, 'artifacts', AppID, 'public', 'data', 'stats', 'global');
            try {
                // Ensure doc exists first
                const docSnap = await getDoc(trendingRef);
                if (!docSnap.exists()) {
                    await setDoc(trendingRef, { playCounts: { [songId]: 1 } });
                } else {
                    await updateDoc(trendingRef, {
                        [`playCounts.${songId}`]: increment(1)
                    });
                }
            } catch (err) {
                console.error("Failed to record play:", err);
            }
        }

        // --- Navigation & Rendering ---
        window.navigate = (view, data = null) => {
            AppState.currentView = view;
            
            // Update Nav Active States
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-white', 'bg-white/5');
                btn.classList.add('text-gray-400', 'text-gray-500'); // desktop, mobile
            });
            event?.currentTarget?.classList?.add('text-white', 'bg-white/5');

            els.contentArea.innerHTML = ''; // clear

            switch (view) {
                case 'home': renderHome(); break;
                case 'search': renderSearch(); break;
                case 'favorites': renderFavorites(); break;
                case 'playlist': renderPlaylistView(data); break;
                case 'settings': renderSettings(); break;
            }
            lucide.createIcons();
        };

        function renderHome() {
            // Calculate Trending
            const trending = [...mockSongs].sort((a, b) => {
                const aCount = AppState.trendingStats[a.id] || 0;
                const bCount = AppState.trendingStats[b.id] || 0;
                return bCount - aCount;
            }).slice(0, 5);

            // Calculate New Releases (mock sort by date)
            const newReleases = [...mockSongs].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 4);

            // Calculate Suggestions (Based on favorite genres)
            let favGenres = AppState.favorites.map(id => mockSongs.find(s=>s.id===id)?.genre).filter(Boolean);
            let suggested = [];
            if (favGenres.length > 0) {
                const popularGenre = favGenres.sort((a,b) => favGenres.filter(v => v===a).length - favGenres.filter(v => v===b).length).pop();
                suggested = mockSongs.filter(s => s.genre === popularGenre && !AppState.favorites.includes(s.id)).slice(0, 4);
            }
            if (suggested.length === 0) suggested = mockSongs.slice(3, 7); // Fallback

            const html = `
                <!-- Hero Banner -->
                <div class="relative w-full h-48 md:h-64 rounded-3xl overflow-hidden glass-card mb-8">
                    <div class="absolute inset-0 bg-gradient-to-r from-brand-900/80 to-transparent z-10 flex flex-col justify-center p-8">
                        <h2 class="text-3xl md:text-5xl font-extrabold text-white mb-2">Evolve Your Sound</h2>
                        <p class="text-brand-100 max-w-md">Discover curated playlists and trending tracks tailored for your unique vibe.</p>
                        <button onclick="playQueue(${JSON.stringify(trending).replace(/"/g, '&quot;')}, 0)" class="mt-4 bg-white text-black px-6 py-2 rounded-full font-bold w-max hover:scale-105 transition-transform flex items-center gap-2">
                            <i data-lucide="play" class="w-4 h-4 fill-current"></i> Play Trending
                        </button>
                    </div>
                    <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=1200&q=80" class="absolute inset-0 w-full h-full object-cover opacity-50 mix-blend-overlay">
                </div>

                <section>
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="trending-up" class="text-brand-400"></i> Trending Now</h3>
                    <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-4 snap-x">
                        ${trending.map((song, i) => SongCardLarge(song, trending, i)).join('')}
                    </div>
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <section>
                        <h3 class="text-xl font-bold mb-4">Made For You</h3>
                        <div class="space-y-2">
                            ${suggested.map((song, i) => SongListItem(song, suggested, i)).join('')}
                        </div>
                    </section>
                    <section>
                        <h3 class="text-xl font-bold mb-4">New Releases</h3>
                        <div class="grid grid-cols-2 gap-4">
                            ${newReleases.map((song, i) => SongCardSmall(song, newReleases, i)).join('')}
                        </div>
                    </section>
                </div>
            `;
            els.contentArea.innerHTML = html;
        }

        function renderSearch() {
            els.contentArea.innerHTML = `
                <div class="sticky top-0 z-10 bg-dark-900/90 backdrop-blur-md pt-2 pb-6">
                    <div class="relative max-w-2xl mx-auto">
                        <i data-lucide="search" class="absolute left-4 top-3.5 text-gray-400 w-5 h-5"></i>
                        <input type="text" id="search-input" placeholder="Search songs, artists, genres..." class="w-full bg-dark-800 border border-gray-700 rounded-full pl-12 pr-4 py-3 focus:outline-none focus:border-brand-500 transition-colors text-white" onkeyup="handleSearch(event)">
                    </div>
                </div>
                <div id="search-results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4">
                    <div class="col-span-full text-center text-gray-500 py-10">Type to start searching</div>
                </div>
            `;
        }

        window.handleSearch = (e) => {
            const query = e.target.value.toLowerCase();
            const resultsContainer = document.getElementById('search-results');
            if (!query) {
                resultsContainer.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10">Type to start searching</div>';
                return;
            }
            const results = mockSongs.filter(s => s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query) || s.genre.toLowerCase().includes(query));
            if (results.length === 0) {
                resultsContainer.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10">No results found.</div>';
                return;
            }
            resultsContainer.innerHTML = results.map((song, i) => SongCardSmall(song, results, i)).join('');
            lucide.createIcons();
        };

        function renderFavorites() {
            const favSongs = AppState.favorites.map(id => mockSongs.find(s => s.id === id)).filter(Boolean);
            els.contentArea.innerHTML = `
                <div class="flex items-end gap-6 mb-8 mt-4">
                    <div class="w-32 h-32 md:w-48 md:h-48 bg-gradient-to-br from-purple-600 to-brand-900 rounded-2xl shadow-2xl flex items-center justify-center">
                        <i data-lucide="heart" class="w-16 h-16 text-white fill-current"></i>
                    </div>
                    <div>
                        <p class="text-sm font-semibold uppercase tracking-wider text-gray-400">Playlist</p>

                        <p class="text-gray-400">${favSongs.length} songs</p>
                        ${favSongs.length > 0 ? `
                        <button onclick="playQueue(${JSON.stringify(favSongs).replace(/"/g, '&quot;')}, 0)" class="mt-4 bg-brand-500 hover:bg-brand-400 text-white p-3 rounded-full shadow-[0_0_20px_rgba(139,92,246,0.4)] transition-all">
                            <i data-lucide="play" class="w-6 h-6 fill-current ml-1"></i>
                        </button>` : ''}
                    </div>
                </div>
                <div class="space-y-2">
                    ${favSongs.length > 0 ? favSongs.map((song, i) => SongListItem(song, favSongs, i)).join('') : '<div class="text-gray-500 py-10">No liked songs yet. Explore and find your favorites!</div>'}
                </div>
            `;
        }

        function renderPlaylistView(playlistId) {
            const playlist = AppState.playlists.find(p => p.id === playlistId);
            if (!playlist) return;
            const pSongs = playlist.songs.map(id => mockSongs.find(s => s.id === id)).filter(Boolean);
            
            els.contentArea.innerHTML = `
                <div class="flex items-end gap-6 mb-8 mt-4">
                    <div class="w-32 h-32 md:w-48 md:h-48 bg-dark-800 rounded-2xl shadow-2xl flex items-center justify-center border border-white/10">
                        <i data-lucide="music" class="w-16 h-16 text-gray-500"></i>
                    </div>
                    <div>
                        <p class="text-sm font-semibold uppercase tracking-wider text-gray-400">Custom Playlist</p>

                            ${pSongs.length > 0 ? `

                                <i data-lucide="play" class="w-6 h-6 fill-current ml-1"></i>

                            <button onclick="deletePlaylist('${playlist.id}')" class="p-3 bg-red-500/10 text-red-500 rounded-full hover:bg-red-500/20 transition-all">
                                <i data-lucide="trash-2" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    ${pSongs.length > 0 ? pSongs.map((song, i) => SongListItem(song, pSongs, i, playlistId)).join('') : '<div class="text-gray-500 py-10">Playlist is empty. Add songs from the home or search pages.</div>'}
                </div>
            `;
        }

        function renderSettings() {
            els.contentArea.innerHTML = `
                <div class="max-w-xl mx-auto mt-10 p-8 glass-card rounded-2xl">
                    <h2 class="text-2xl font-bold mb-6 border-b border-white/10 pb-4">Settings & Account</h2>
                    
                    <div class="flex items-center gap-4 mb-8">
                        <img src="${AppState.user.photoURL || `https://ui-avatars.com/api/?name=${AppState.user.email}&background=random`}" class="w-16 h-16 rounded-full border-2 border-brand-500">
                        <div>
                            <div class="font-bold text-lg">${AppState.user.displayName || 'User'}</div>
                            <div class="text-gray-400">${AppState.user.email}</div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <button onclick="handleSignOut()" class="w-full bg-dark-700 hover:bg-dark-600 px-4 py-3 rounded-xl text-left flex items-center justify-between transition-colors">
                            <span>Sign Out</span>
                            <i data-lucide="log-out" class="w-5 h-5 text-gray-400"></i>
                        </button>
                        <button onclick="handleDeleteAccount()" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 px-4 py-3 rounded-xl text-left flex items-center justify-between transition-colors">
                            <span>Delete Account</span>
                            <i data-lucide="user-x" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // --- UI Components ---
        const SongCardLarge = (song, queue, index) => `
            <div class="min-w-[160px] md:min-w-[200px] snap-center group cursor-pointer" onclick="playQueue(${JSON.stringify(queue).replace(/"/g, '&quot;')}, ${index})">
                <div class="relative overflow-hidden rounded-2xl mb-3 shadow-lg">
                    <img src="${song.cover}" class="w-full aspect-square object-cover group-hover:scale-110 transition-transform duration-500">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <div class="w-12 h-12 bg-brand-500 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(139,92,246,0.6)]">
                            <i data-lucide="play" class="w-6 h-6 text-white fill-current ml-1"></i>
                        </div>
                    </div>
                </div>
                <h4 class="font-bold text-sm md:text-base truncate group-hover:text-brand-400 transition-colors">${song.title}</h4>
                <p class="text-xs md:text-sm text-gray-400 truncate">${song.artist}</p>
            </div>
        `;

        const SongCardSmall = (song, queue, index) => `
            <div class="glass-panel p-3 rounded-xl flex items-center gap-3 hover:bg-white/5 transition-colors group cursor-pointer" onclick="playQueue(${JSON.stringify(queue).replace(/"/g, '&quot;')}, ${index})">
                <img src="${song.cover}" class="w-12 h-12 rounded-lg object-cover">
                <div class="flex-1 overflow-hidden">
                    <h4 class="font-semibold text-sm truncate group-hover:text-brand-400">${song.title}</h4>
                    <p class="text-xs text-gray-400 truncate">${song.artist}</p>
                </div>
                <button class="p-2 opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.stopPropagation(); openPlaylistModal('${song.id}')">
                    <i data-lucide="plus" class="w-4 h-4 text-gray-400 hover:text-white"></i>
                </button>
            </div>
        `;

        const SongListItem = (song, queue, index, playlistId = null) => `
            <div class="flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 transition-colors group cursor-pointer" onclick="playQueue(${JSON.stringify(queue).replace(/"/g, '&quot;')}, ${index})">
                <div class="w-8 text-center text-gray-500 text-sm hidden md:block group-hover:hidden">${index + 1}</div>
                <div class="w-8 text-center text-brand-400 text-sm hidden group-hover:block md:group-hover:block"><i data-lucide="play" class="w-4 h-4 fill-current mx-auto"></i></div>
                
                <img src="${song.cover}" class="w-10 h-10 rounded object-cover">
                <div class="flex-1 overflow-hidden">
                    <h4 class="font-semibold text-sm truncate">${song.title}</h4>
                    <p class="text-xs text-gray-400 truncate">${song.artist}</p>
                </div>
                <div class="text-xs text-gray-500 hidden md:block w-32 truncate">${song.genre}</div>
                
                <div class="flex items-center gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">

                    <button class="p-2" onclick="event.stopPropagation(); removeFromPlaylist('${song.id}', '${playlistId}')" title="Remove">
                        <i data-lucide="x" class="w-4 h-4 text-red-400"></i>
                    </button>` : `
                    <button class="p-2" onclick="event.stopPropagation(); openPlaylistModal('${song.id}')" title="Add to Playlist">
                        <i data-lucide="plus" class="w-4 h-4 text-gray-400 hover:text-white"></i>
                    </button>`}
                    <button class="p-2" onclick="event.stopPropagation(); window.toggleFavorite('${song.id}')">
                        <i data-lucide="heart" class="w-4 h-4 ${AppState.favorites.includes(song.id) ? 'text-brand-500 fill-current' : 'text-gray-400 hover:text-white'}"></i>
                    </button>
                </div>
            </div>
        `;

        // --- Playlists Logic ---
        function renderSidebarPlaylists() {
            els.sidebarPlaylists.innerHTML = AppState.playlists.map(p => `
                <button onclick="navigate('playlist', '${p.id}')" class="w-full text-left px-4 py-2 text-sm text-gray-400 hover:text-white hover:bg-white/5 rounded-lg truncate transition-colors">
                    ${p.name}
                </button>
            `).join('');
        }

        window.createNewPlaylist = async (name = null) => {
            if(!name) {
                name = prompt("Enter playlist name:");
            }
            if(name && name.trim()) {
                const newPlaylist = { id: 'pl_' + Date.now(), name: name.trim(), songs: [] };
                AppState.playlists.push(newPlaylist);
                await saveUserData();
                renderSidebarPlaylists();
            }
        };

        window.deletePlaylist = async (id) => {
            if(confirm("Delete this playlist?")) {
                AppState.playlists = AppState.playlists.filter(p => p.id !== id);
                await saveUserData();
                renderSidebarPlaylists();
                navigate('home');
            }
        };

        window.openPlaylistModal = (songId) => {
            AppState.songToPlaylistId = songId;
            const content = document.getElementById('modal-content');
            if (AppState.playlists.length === 0) {
                content.innerHTML = '<p class="text-sm text-gray-500">No playlists yet.</p>';
            } else {
                content.innerHTML = AppState.playlists.map(p => `
                    <button onclick="addToPlaylist('${p.id}')" class="w-full text-left px-4 py-3 rounded-lg bg-dark-800 hover:bg-dark-700 text-sm transition-colors flex justify-between items-center">
                        ${p.name}
                        ${p.songs.includes(songId) ? '<i data-lucide="check" class="w-4 h-4 text-brand-500"></i>' : ''}
                    </button>
                `).join('');
            }
            els.playlistModal.classList.remove('hidden');
            lucide.createIcons();
        };

        window.closeModal = () => {
            els.playlistModal.classList.add('hidden');
            document.getElementById('new-playlist-input').value = '';
        };

        window.handleCreatePlaylist = async () => {
            const input = document.getElementById('new-playlist-input');
            if(input.value.trim()) {
                await createNewPlaylist(input.value);
                openPlaylistModal(AppState.songToPlaylistId); // refresh list
                input.value = '';
            }
        };

        window.addToPlaylist = async (playlistId) => {
            const songId = AppState.songToPlaylistId;
            const pl = AppState.playlists.find(p => p.id === playlistId);
            if(pl && !pl.songs.includes(songId)) {
                pl.songs.push(songId);
                await saveUserData();
                closeModal();
                // small toast could go here
            } else if (pl && pl.songs.includes(songId)) {
                // remove if already there (toggle logic)
                pl.songs = pl.songs.filter(id => id !== songId);
                await saveUserData();
                closeModal();
            }
        };

        window.removeFromPlaylist = async (songId, playlistId) => {
            const pl = AppState.playlists.find(p => p.id === playlistId);
            if(pl) {
                pl.songs = pl.songs.filter(id => id !== songId);
                await saveUserData();
                if(AppState.currentView === 'playlist') renderPlaylistView(playlistId);
            }
        };

        window.toggleFavorite = async (songId) => {
            const idx = AppState.favorites.indexOf(songId);
            if (idx > -1) AppState.favorites.splice(idx, 1);
            else AppState.favorites.push(songId);
            
            await saveUserData();
            
            // Re-render current view if needed
            if(AppState.currentView === 'home') renderHome();
            if(AppState.currentView === 'favorites') renderFavorites();
            if(AppState.currentView === 'playlist') navigate('playlist', document.querySelector('h2').innerText); // Hacky re-render
            if(AppState.currentView === 'search') handleSearch({target: document.getElementById('search-input')}); // Re-render search

            // Update player like button if current song
            if(AppState.queue[AppState.currentIndex]?.id === songId) {
                updateLikeButtonUI();
            }
            lucide.createIcons();
        };

        window.toggleCurrentFavorite = (e) => {
            e.stopPropagation();
            const currentSong = AppState.queue[AppState.currentIndex];
            if(currentSong) toggleFavorite(currentSong.id);
        };

        // --- Player Logic ---
        window.playQueue = (queue, index) => {
            AppState.queue = queue;
            AppState.currentIndex = index;
            loadSong();
        };

        function loadSong() {
            const song = AppState.queue[AppState.currentIndex];
            if (!song) return;

            els.playerContainer.classList.remove('hidden');
            
            // Update UI
            document.getElementById('track-title').innerText = song.title;
            document.getElementById('track-artist').innerText = song.artist;
            document.getElementById('cover-art').src = song.cover;
            
            // Dynamic Theme Color
            document.documentElement.style.setProperty('--glow-color', `${song.color}40`); // 40 is hex alpha (approx 25%)

            updateLikeButtonUI();

            // Audio Logic
            AppState.audio.src = song.src;
            AppState.audio.play().catch(e => console.error("Audio playback prevented:", e));
            recordPlay(song.id);
        }

        window.togglePlay = (e) => {
            if(e) e.stopPropagation();
            if (!AppState.audio.src) return;
            if (AppState.isPlaying) AppState.audio.pause();
            else AppState.audio.play();
        };

        function updatePlayButtonUI() {
            const icon = AppState.isPlaying ? 'pause' : 'play';
            document.getElementById('main-play-icon').setAttribute('data-lucide', icon);
            document.getElementById('mini-play-icon').setAttribute('data-lucide', icon);
            lucide.createIcons();
        }

        function updateLikeButtonUI() {
            const song = AppState.queue[AppState.currentIndex];
            const isFav = song && AppState.favorites.includes(song.id);
            const mainIcon = document.getElementById('like-icon');
            const mobileIcon = document.getElementById('m-like-icon');
            
            [mainIcon, mobileIcon].forEach(el => {
                if(el) {
                    if(isFav) {
                        el.classList.add('text-brand-500', 'fill-current');
                        el.classList.remove('text-gray-400');
                    } else {
                        el.classList.remove('text-brand-500', 'fill-current');
                        el.classList.add('text-gray-400');
                    }
                }
            });
        }

        window.playNext = (e) => {
            if(e) e.stopPropagation();
            if (AppState.queue.length === 0) return;
            
            if (AppState.isShuffle) {
                AppState.currentIndex = Math.floor(Math.random() * AppState.queue.length);
            } else {
                AppState.currentIndex = (AppState.currentIndex + 1) % AppState.queue.length;
            }
            loadSong();
        };

        window.playPrev = (e) => {
            if(e) e.stopPropagation();
            if (AppState.queue.length === 0) return;
            
            if (AppState.audio.currentTime > 3) {
                AppState.audio.currentTime = 0; // Restart song if past 3s
            } else {
                AppState.currentIndex = (AppState.currentIndex - 1 + AppState.queue.length) % AppState.queue.length;
                loadSong();
            }
        };

        function handleSongEnd() {
            if (AppState.isRepeat) {
                AppState.audio.currentTime = 0;
                AppState.audio.play();
            } else {
                playNext();
            }
        }

        window.toggleShuffle = (e) => {
            if(e) e.stopPropagation();
            AppState.isShuffle = !AppState.isShuffle;
            const b1 = document.getElementById('shuffle-btn');
            const b2 = document.getElementById('m-shuffle-btn');
            [b1, b2].forEach(b => {
                if(b) b.classList.toggle('text-brand-500', AppState.isShuffle);
                if(b) b.classList.toggle('text-gray-400', !AppState.isShuffle);
            });
        };

        window.toggleRepeat = (e) => {
            if(e) e.stopPropagation();
            AppState.isRepeat = !AppState.isRepeat;
            const b1 = document.getElementById('repeat-btn');
            const b2 = document.getElementById('m-repeat-btn');
            [b1, b2].forEach(b => {
                if(b) b.classList.toggle('text-brand-500', AppState.isRepeat);
                if(b) b.classList.toggle('text-gray-400', !AppState.isRepeat);
            });
        };

        function updateProgressUI() {
            const { duration, currentTime } = AppState.audio;
            if (isNaN(duration)) return;
            
            const progressPercent = (currentTime / duration) * 100;
            document.getElementById('progress-bar').value = progressPercent;
            
            document.getElementById('time-current').innerText = formatTime(currentTime);
            document.getElementById('time-total').innerText = formatTime(duration);
        }

        window.seekAudio = (e) => {
            const seekTime = (e.target.value / 100) * AppState.audio.duration;
            AppState.audio.currentTime = seekTime;
        };

        window.setVolume = (e) => {
            AppState.audio.volume = e.target.value;
        };

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        // Mobile Full Screen Player Logic
        window.toggleFullScreenPlayer = (e) => {
            if (window.innerWidth >= 768) return; // Only mobile
            els.playerContainer.classList.toggle('full-screen');
            if(els.playerContainer.classList.contains('full-screen')){
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        };

        // Handle drag to close on handle
        let startY = 0;
        document.getElementById('drag-handle').addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, {passive: true});
        document.getElementById('drag-handle').addEventListener('touchmove', (e) => {
            if(e.touches[0].clientY - startY > 50) {
                els.playerContainer.classList.remove('full-screen');
                document.body.style.overflow = '';
            }
        }, {passive: true});


        // --- User Actions ---
        window.handleSignOut = () => {
            signOut(auth);
            if(trendingUnsubscribe) trendingUnsubscribe();
            if(userUnsubscribe) userUnsubscribe();
        };

        window.handleDeleteAccount = async () => {
            if(confirm("WARNING: This will permanently delete your account. Proceed?")) {
                try {
                    await deleteUser(auth.currentUser);
                    // Firestore rules usually prevent deletion of docs by non-users, 
                    // a cloud function is better here, but we delete the user auth.
                    alert("Account deleted.");
                    window.location.reload();
                } catch(err) {
                    alert("Failed to delete account. You may need to sign in again recently. " + err.message);
                }
            }
        };

        // Initialize icons
        lucide.createIcons();

    </script>
</body>
</html>

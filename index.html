<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Music - Evolve Your Sound</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6', 600: '#7c3aed', 900: '#4c1d95' },
                        dark: { 900: '#0a0a0a', 800: '#121212', 700: '#27272a' },
                        glass: 'rgba(18, 18, 18, 0.8)'
                    },
                    spacing: {
                        'safe': 'env(safe-area-inset-bottom)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            overflow: hidden; /* Prevent body scroll, handle internally */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(39, 39, 42, 0.4) 0%, rgba(24, 24, 27, 0.2) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: linear-gradient(145deg, rgba(45, 45, 50, 0.5) 0%, rgba(30, 30, 35, 0.3) 100%);
        }

        /* Desktop Range Sliders */
        .desktop-slider {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        .desktop-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px; width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
        }
        .desktop-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .desktop-slider::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: #3f3f46;
            border-radius: 2px;
        }
        .desktop-slider:focus { outline: none; }

        /* Dynamic Background Glow for App */
        #bg-glow {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% -20%, var(--glow-color, rgba(139, 92, 246, 0.15)) 0%, transparent 60%);
            z-index: -1;
            transition: background 1.5s ease;
        }

        /* Mobile Progress Bar Logic */
        input[type=range].mobile-scrubber::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px; background: transparent;
        }
        input[type=range].mobile-scrubber::-webkit-slider-runnable-track {
            width: 100%; height: 100%; background: transparent;
        }
        
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .player-hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-[100dvh] antialiased select-none">
    
    <div id="bg-glow"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-dark-900/95 backdrop-blur-xl">
        <div class="glass-panel p-8 rounded-3xl w-[90%] max-w-md relative overflow-hidden shadow-2xl">
            <div class="absolute -top-20 -right-20 w-48 h-48 bg-brand-600 rounded-full blur-[80px] opacity-40"></div>
            
            <div class="text-center mb-10 mt-4 relative z-10">
                <div class="flex items-center justify-center gap-3 mb-4">
                    <div class="w-12 h-12 bg-brand-500 rounded-full flex items-center justify-center shadow-lg shadow-brand-500/30">
                        <i data-lucide="audio-waveform" class="text-white w-7 h-7"></i>
                    </div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-white">Aura</h1>
                </div>
                <p class="text-gray-400 text-sm font-medium">Your personal sound universe.</p>
            </div>

            <div id="auth-error" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl text-center font-medium"></div>

            <form id="auth-form" class="space-y-4 relative z-10">
                <input type="email" id="auth-email" placeholder="Email Address" required class="w-full bg-dark-800/50 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:outline-none focus:border-brand-500 focus:bg-dark-800 transition-all">
                <input type="password" id="auth-password" placeholder="Password" required class="w-full bg-dark-800/50 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:outline-none focus:border-brand-500 focus:bg-dark-800 transition-all">
                
                <button type="submit" id="auth-submit" class="w-full bg-white text-black font-bold py-4 rounded-2xl transition-transform hover:scale-[1.02] active:scale-[0.98] mt-2">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center relative z-10">
                <button id="toggle-auth-mode" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">
                    Need an account? Sign Up
                </button>
            </div>

            <div class="flex items-center my-8 relative z-10">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="px-4 text-xs font-bold text-gray-500 tracking-wider">OR</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <button id="google-signin-btn" class="w-full bg-dark-800 border border-white/10 text-white font-semibold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-dark-700 transition-colors relative z-10">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Continue with Google
            </button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="main-app" class="flex flex-1 w-full h-full hidden overflow-hidden">
        
        <!-- Sidebar (Desktop) -->
        <aside class="w-64 glass-panel border-r border-white/5 hidden md:flex flex-col z-10 h-full bg-dark-900/50">
            <div class="p-6 flex items-center gap-3">
                <i data-lucide="audio-waveform" class="text-brand-500 w-8 h-8"></i>
                <span class="text-2xl font-extrabold tracking-tight">Aura</span>
            </div>

            <nav class="flex-1 px-4 py-2 space-y-1 overflow-y-auto hide-scrollbar">
                <button onclick="navigate('home')" class="nav-btn w-full flex items-center gap-4 px-4 py-3.5 rounded-xl font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all active-nav">
                    <i data-lucide="home" class="w-6 h-6"></i> Home
                </button>
                <button onclick="navigate('search')" class="nav-btn w-full flex items-center gap-4 px-4 py-3.5 rounded-xl font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="search" class="w-6 h-6"></i> Search
                </button>
                <button onclick="navigate('favorites')" class="nav-btn w-full flex items-center gap-4 px-4 py-3.5 rounded-xl font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="heart" class="w-6 h-6"></i> Library
                </button>

                <div class="pt-6 pb-2 px-4 flex justify-between items-center text-xs font-bold text-gray-500 uppercase tracking-widest">
                    Playlists
                    <button onclick="createNewPlaylist()" class="hover:text-white transition-colors p-1"><i data-lucide="plus" class="w-4 h-4"></i></button>
                </div>
                <div id="sidebar-playlists" class="space-y-1">
                    <!-- Dynamic Playlists -->
                </div>
            </nav>

            <div class="p-4 border-t border-white/5">
                <button onclick="navigate('settings')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=User" class="w-9 h-9 rounded-full object-cover bg-dark-800">
                    <div class="text-left flex-1 overflow-hidden">
                        <div id="user-name" class="text-sm font-semibold truncate text-white">User</div>
                        <div class="text-[11px] truncate">Settings</div>
                    </div>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 relative overflow-y-auto h-full scroll-smooth" id="scroll-main">
            <!-- Mobile Header -->
            <header class="sticky top-0 z-20 bg-gradient-to-b from-dark-900 via-dark-900/90 to-transparent px-5 pt-12 pb-4 flex justify-between items-center md:hidden">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-brand-500 rounded-full flex items-center justify-center shadow-lg shadow-brand-500/30">
                        <i data-lucide="audio-waveform" class="text-white w-4 h-4"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Aura</span>
                </div>
                <button onclick="navigate('settings')" class="hover:scale-105 transition-transform">
                    <img id="mobile-avatar" src="https://ui-avatars.com/api/?name=User" class="w-9 h-9 rounded-full border border-white/10 shadow-lg bg-dark-800 object-cover">
                </button>
            </header>

            <div id="content-area" class="p-5 md:p-10 pb-40 md:pb-32 max-w-[1600px] mx-auto space-y-10">
                <!-- Views injected here by JS -->
            </div>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- PLAYERS ARCHITECTURE (Mobile & Desktop)    -->
    <!-- ========================================== -->

    <!-- 1. Mobile Mini Player (Floating above Nav) -->
    <div id="mobile-mini-player" class="player-hidden fixed bottom-[66px] left-2 right-2 bg-dark-800 rounded-xl h-[56px] z-30 flex items-center px-2 shadow-2xl md:hidden cursor-pointer transition-transform overflow-hidden group" onclick="expandPlayer()">
        <!-- Progress Bar Line -->
        <div class="absolute bottom-0 left-0 w-full h-[2px] bg-white/10 rounded-b-xl overflow-hidden">
            <div id="mini-progress-fill" class="h-full bg-white rounded-r-full transition-all duration-100 ease-linear" style="width: 0%;"></div>
        </div>
        
        <img src="" class="js-cover-art w-10 h-10 rounded-md object-cover shadow-md bg-dark-700 ml-1">
        <div class="flex-1 overflow-hidden px-3 flex flex-col justify-center">
            <h4 class="js-track-title text-sm font-bold text-white truncate drop-shadow-md">Track</h4>
            <p class="js-track-artist text-xs text-gray-300 truncate">Artist</p>
        </div>
        <div class="flex items-center gap-2 pr-1">
            <button onclick="toggleCurrentFavorite(event); event.stopPropagation();" class="p-3 -m-1">
                <i data-lucide="heart" id="mini-like-icon" class="w-6 h-6 text-gray-400 hover:scale-110 transition-transform"></i>
            </button>
            <button onclick="togglePlay(event); event.stopPropagation();" class="p-3 -m-1">
                <i data-lucide="play" id="mini-play-icon" class="w-6 h-6 text-white fill-current hover:scale-110 transition-transform"></i>
            </button>
        </div>
    </div>

    <!-- 2. Mobile Full Screen Player (Overlay) -->
    <div id="mobile-full-player" class="fixed inset-0 z-[60] bg-dark-900 flex flex-col translate-y-full transition-transform duration-300 ease-out md:hidden shadow-[-10px_0_30px_rgba(0,0,0,0.5)]">
        <!-- Dynamic Blur Background -->
        <div id="mfp-bg" class="absolute inset-0 bg-gradient-to-b from-dark-800 to-dark-900 opacity-80 z-0 transition-colors duration-700"></div>
        <div class="absolute inset-0 bg-black/40 z-0 backdrop-blur-[60px]"></div>
        
        <!-- Content -->
        <div class="relative z-10 flex flex-col h-full px-6 pt-10 pb-6 md:pb-8">
            <!-- Header -->
            <div class="flex justify-between items-center mb-4 md:mb-6 shrink-0">
                <button onclick="collapsePlayer()" class="p-2 -ml-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="chevron-down" class="w-7 h-7 text-white"></i></button>
                <span class="text-[10px] sm:text-xs font-bold tracking-[0.2em] text-white/80 drop-shadow-md text-center" id="mfp-context">PLAYING FROM AURA</span>
                <button class="p-2 -mr-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="more-vertical" class="w-6 h-6 text-white"></i></button>
            </div>

            <!-- Cover Art Container -->
            <div class="flex-1 flex items-center justify-center min-h-0 mb-6 w-full">
                <img src="" id="mfp-cover-art" class="js-cover-art w-full max-w-[340px] max-h-[42vh] aspect-square object-cover rounded-xl shadow-[0_20px_50px_-15px_rgba(0,0,0,0.7)] bg-dark-800 transition-transform duration-200">
            </div>

            <!-- Song Info & Like -->
            <div class="flex justify-between items-end mb-6 shrink-0">
                <div class="flex-1 overflow-hidden pr-4">
                    <h2 class="js-track-title text-2xl font-bold text-white truncate mb-1.5 drop-shadow-lg">Select a track</h2>
                    <p class="js-track-artist text-lg text-white/70 truncate drop-shadow-md">Artist</p>
                </div>
                <button onclick="toggleCurrentFavorite(event)" class="p-2 -mr-2 mb-1">
                    <i data-lucide="heart" id="mfp-like-icon" class="w-8 h-8 text-white/70 transition-colors"></i>
                </button>
            </div>

            <!-- Custom Progress Scrubber -->
            <div class="mb-6 shrink-0 relative">
                <div class="relative h-[4px] w-full bg-white/20 rounded-full group">
                    <div id="mfp-progress-fill" class="absolute left-0 top-0 h-full bg-white rounded-full transition-all duration-100 ease-linear" style="width: 0%;"></div>
                    <div id="mfp-progress-thumb" class="absolute top-1/2 -mt-[6px] -ml-[6px] w-3 h-3 bg-white rounded-full shadow pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity" style="left: 0%;"></div>
                    <input type="range" id="mfp-progress" min="0" max="100" value="0" class="absolute inset-0 w-full h-full opacity-0 z-10 mobile-scrubber cursor-pointer" oninput="seekAudio(event); updateMfpScrubberUI(event)" onchange="seekAudio(event)">
                </div>
                <div class="flex justify-between text-xs text-white/60 font-medium mt-2">
                    <span id="mfp-time-current">0:00</span>
                    <span id="mfp-time-total">0:00</span>
                </div>
            </div>

            <!-- Main Controls -->
            <div class="flex justify-between items-center mb-6 px-2 shrink-0">
                <button onclick="toggleShuffle(event)" class="p-2"><i data-lucide="shuffle" id="mfp-shuffle" class="w-6 h-6 text-white/70"></i></button>
                <button onclick="playPrev(event)" class="p-2"><i data-lucide="skip-back" class="w-10 h-10 text-white fill-current"></i></button>
                <button onclick="togglePlay(event)" class="w-20 h-20 bg-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-transform shadow-[0_10px_30px_rgba(255,255,255,0.2)]">
                    <i data-lucide="play" id="mfp-play-icon" class="w-8 h-8 text-black fill-current ml-1"></i>
                </button>
                <button onclick="playNext(event)" class="p-2"><i data-lucide="skip-forward" class="w-10 h-10 text-white fill-current"></i></button>
                <button onclick="toggleRepeat(event)" class="p-2"><i data-lucide="repeat" id="mfp-repeat" class="w-6 h-6 text-white/70"></i></button>
            </div>

            <!-- Footer Actions -->
            <div class="flex justify-between items-center text-white/60 mt-auto pt-2 shrink-0 pb-safe">
                <button class="p-2 hover:text-white transition-colors"><i data-lucide="monitor-speaker" class="w-6 h-6"></i></button>
                <button class="p-2 hover:text-white transition-colors"><i data-lucide="share-2" class="w-6 h-6"></i></button>
            </div>
        </div>
    </div>

    <!-- 3. Desktop Player Bar -->
    <div id="desktop-player" class="player-hidden fixed bottom-0 left-0 right-0 bg-dark-900 border-t border-white/5 h-[90px] z-50 flex items-center justify-between px-6 transition-all duration-300 hidden md:flex backdrop-blur-3xl bg-opacity-95">
        
        <!-- Left: Info -->
        <div class="flex items-center gap-4 w-1/3">
            <img src="" class="js-cover-art w-14 h-14 rounded-md object-cover shadow-md bg-dark-800">
            <div class="flex-1 overflow-hidden">
                <h4 class="js-track-title text-sm font-bold text-white truncate hover:underline cursor-pointer">Select track</h4>
                <p class="js-track-artist text-xs text-gray-400 truncate hover:underline cursor-pointer mt-0.5">Artist</p>
            </div>
            <button onclick="toggleCurrentFavorite(event)" class="p-2 hover:bg-white/5 rounded-full transition-colors ml-2">
                <i data-lucide="heart" id="desktop-like-icon" class="w-5 h-5 text-gray-400 hover:text-white"></i>
            </button>
        </div>

        <!-- Center: Controls -->
        <div class="w-1/3 flex flex-col items-center gap-2 max-w-[600px]">
            <div class="flex items-center gap-6">
                <button onclick="toggleShuffle(event)" class="text-gray-400 hover:text-white transition-colors" id="desktop-shuffle"><i data-lucide="shuffle" class="w-[18px] h-[18px]"></i></button>
                <button onclick="playPrev(event)" class="text-gray-300 hover:text-white transition-colors"><i data-lucide="skip-back" class="w-5 h-5 fill-current"></i></button>
                <button onclick="togglePlay(event)" class="w-9 h-9 bg-white rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-lg">
                    <i data-lucide="play" id="desktop-play-icon" class="w-[18px] h-[18px] text-black fill-current ml-0.5"></i>
                </button>
                <button onclick="playNext(event)" class="text-gray-300 hover:text-white transition-colors"><i data-lucide="skip-forward" class="w-5 h-5 fill-current"></i></button>
                <button onclick="toggleRepeat(event)" class="text-gray-400 hover:text-white transition-colors" id="desktop-repeat"><i data-lucide="repeat" class="w-[18px] h-[18px]"></i></button>
            </div>
            <div class="flex items-center gap-3 w-full group">
                <span id="desktop-time-current" class="text-[11px] text-gray-400 w-10 text-right font-medium">0:00</span>
                <input type="range" id="desktop-progress" min="0" max="100" value="0" class="desktop-slider flex-1" onchange="seekAudio(event)">
                <span id="desktop-time-total" class="text-[11px] text-gray-400 w-10 font-medium">0:00</span>
            </div>
        </div>

        <!-- Right: Extras -->
        <div class="w-1/3 flex justify-end items-center gap-4">
            <button onclick="showQueue(event)" class="text-gray-400 hover:text-white p-2"><i data-lucide="list-music" class="w-4 h-4"></i></button>
            <button class="text-gray-400 hover:text-white p-2"><i data-lucide="monitor-speaker" class="w-4 h-4"></i></button>
            <div class="flex items-center gap-2 w-28 group ml-2">
                <i data-lucide="volume-2" class="w-4 h-4 text-gray-400 group-hover:text-white transition-colors"></i>
                <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="1" class="desktop-slider w-full" oninput="setVolume(event)">
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-dark-900/95 backdrop-blur-2xl border-t border-white/5 h-[60px] flex justify-around items-center md:hidden z-20 px-2 pb-safe shadow-[0_-5px_20px_rgba(0,0,0,0.5)]">
        <button onclick="navigate('home')" class="nav-btn flex flex-col items-center gap-1 p-2 w-16 text-gray-400 active-nav hover:text-white transition-colors">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] font-medium">Home</span>
        </button>
        <button onclick="navigate('search')" class="nav-btn flex flex-col items-center gap-1 p-2 w-16 text-gray-400 hover:text-white transition-colors">
            <i data-lucide="search" class="w-6 h-6"></i>
            <span class="text-[10px] font-medium">Search</span>
        </button>
        <button onclick="navigate('favorites')" class="nav-btn flex flex-col items-center gap-1 p-2 w-16 text-gray-400 hover:text-white transition-colors">
            <i data-lucide="library" class="w-6 h-6"></i>
            <span class="text-[10px] font-medium">Library</span>
        </button>
    </nav>

    <!-- Modal for Playlists -->
    <div id="playlist-modal" class="fixed inset-0 z-[70] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-dark-800 rounded-2xl w-full max-w-sm p-6 shadow-2xl border border-white/10">
            <h3 class="text-xl font-bold mb-5" id="modal-title">Save to Playlist</h3>
            <div id="modal-content" class="space-y-2 max-h-[40vh] overflow-y-auto hide-scrollbar mb-5">
                <!-- Playlist options injected here -->
            </div>
            <div class="flex gap-2">
                <input type="text" id="new-playlist-input" placeholder="New playlist name..." class="flex-1 bg-dark-900/50 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand-500 transition-colors">
                <button onclick="handleCreatePlaylist()" class="bg-white text-black px-5 py-3 rounded-xl text-sm font-bold hover:scale-105 transition-transform">Create</button>
            </div>
            <button onclick="closeModal()" class="mt-4 w-full py-3 text-gray-400 hover:text-white text-sm font-semibold transition-colors">Cancel</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification, deleteUser } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration (Preserved completely as requested)
        const firebaseConfig = {
            apiKey: "AIzaSyAGmSHiSFvlOIk5woSsbBLI5rndASromyg",
            authDomain: "dmin-dbe58.firebaseapp.com",
            databaseURL: "https://dmin-dbe58-default-rtdb.firebaseio.com",
            projectId: "dmin-dbe58",
            storageBucket: "dmin-dbe58.firebasestorage.app",
            messagingSenderId: "369190320724",
            appId: "1:369190320724:web:29a949f473c557d63d4bc1",
            measurementId: "G-ZE2EEQC2WM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const AppID = 'dmin-dbe58'; 

        // --- Mock Data System ---
        const mockSongs = [
            { id: 's1', title: 'Neon Nightscape', artist: 'Synthwave Engine', genre: 'Electronic', cover: 'https://images.unsplash.com/photo-1614113489855-66422ad300a4?w=400&q=80', color: '#8b5cf6', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', date: '2024-05-10' },
            { id: 's2', title: 'Urban Flow', artist: 'Beatsmith', genre: 'Hip Hop', cover: 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&q=80', color: '#ec4899', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', date: '2024-05-15' },
            { id: 's3', title: 'Acoustic Sunrise', artist: 'The Wanderers', genre: 'Acoustic', cover: 'https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=400&q=80', color: '#f59e0b', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3', date: '2024-04-20' },
            { id: 's4', title: 'Deep Space', artist: 'Nova', genre: 'Electronic', cover: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=400&q=80', color: '#3b82f6', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3', date: '2024-05-17' },
            { id: 's5', title: 'Jazz Lounge', artist: 'Midnight Quartet', genre: 'Jazz', cover: 'https://images.unsplash.com/photo-1511192336575-5a79af67a629?w=400&q=80', color: '#eab308', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3', date: '2024-03-10' },
            { id: 's6', title: 'Rock Anthem', artist: 'Iron Edge', genre: 'Rock', cover: 'https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?w=400&q=80', color: '#ef4444', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3', date: '2024-05-01' },
            { id: 's7', title: 'Lo-Fi Chill', artist: 'Rainy Days', genre: 'Lo-Fi', cover: 'https://images.unsplash.com/photo-1483808161634-29aa1b1151c0?w=400&q=80', color: '#6366f1', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3', date: '2024-05-16' },
            { id: 's8', title: 'Classical Serenade', artist: 'Symphony X', genre: 'Classical', cover: 'https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=400&q=80', color: '#d946ef', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3', date: '2024-02-14' }
        ];

        // --- App State ---
        window.AppState = {
            user: null,
            favorites: [],
            playlists: [],
            trendingStats: {},
            currentView: 'home',
            
            queue: [],
            currentIndex: -1,
            isPlaying: false,
            isShuffle: false,
            isRepeat: false,
            audio: new Audio(),
            songToPlaylistId: null
        };

        // Audio initialization
        AppState.audio.volume = 1;
        AppState.audio.addEventListener('timeupdate', updateProgressUI);
        AppState.audio.addEventListener('ended', handleSongEnd);
        AppState.audio.addEventListener('play', () => { AppState.isPlaying = true; updatePlayButtonUI(); });
        AppState.audio.addEventListener('pause', () => { AppState.isPlaying = false; updatePlayButtonUI(); });

        // --- DOM Elements ---
        const els = {
            authScreen: document.getElementById('auth-screen'),
            mainApp: document.getElementById('main-app'),
            contentArea: document.getElementById('content-area'),
            desktopPlayer: document.getElementById('desktop-player'),
            mobileMiniPlayer: document.getElementById('mobile-mini-player'),
            mobileFullPlayer: document.getElementById('mobile-full-player'),
            authForm: document.getElementById('auth-form'),
            authError: document.getElementById('auth-error'),
            googleBtn: document.getElementById('google-signin-btn'),
            toggleAuthBtn: document.getElementById('toggle-auth-mode'),
            sidebarPlaylists: document.getElementById('sidebar-playlists'),
            playlistModal: document.getElementById('playlist-modal')
        };

        let isLoginMode = true;

        // --- Authentication Flow ---
        els.toggleAuthBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-submit').innerText = isLoginMode ? 'Sign In' : 'Sign Up';
            els.toggleAuthBtn.innerText = isLoginMode ? 'Need an account? Sign Up' : 'Already have an account? Sign In';
            els.authError.classList.add('hidden');
        });

        els.authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            els.authError.classList.add('hidden');

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(cred.user);
                    alert("Account created! Please check your email for a verification link.");
                }
            } catch (err) {
                showAuthError(err.message);
            }
        });

        els.googleBtn.addEventListener('click', async () => {
            els.authError.classList.add('hidden');
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                showAuthError("Google Sign-In failed.");
            }
        });

        function showAuthError(msg) {
            els.authError.innerText = msg;
            els.authError.classList.remove('hidden');
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                AppState.user = user;
                els.authScreen.classList.add('hidden');
                els.mainApp.classList.remove('hidden');
                
                const name = user.displayName || user.email.split('@')[0];
                const pic = user.photoURL || `https://ui-avatars.com/api/?name=${name}&background=121212&color=fff`;
                
                document.getElementById('user-name').innerText = name;
                document.getElementById('user-avatar').src = pic;
                document.getElementById('mobile-avatar').src = pic;

                await loadUserData();
                loadTrendingData();
                navigate('home');
            } else {
                AppState.user = null;
                els.authScreen.classList.remove('hidden');
                els.mainApp.classList.add('hidden');
                
                els.desktopPlayer.classList.add('player-hidden');
                els.mobileMiniPlayer.classList.add('player-hidden');
                AppState.audio.pause();
            }
        });

        // --- Data Fetching ---
        let trendingUnsubscribe = null;
        let userUnsubscribe = null;

        async function loadUserData() {
            if (!AppState.user) return;
            const uid = AppState.user.uid;
            const userRef = doc(db, 'artifacts', AppID, 'users', uid, 'profile', 'data');
            
            userUnsubscribe = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    AppState.favorites = data.favorites || [];
                    AppState.playlists = data.playlists || [];
                } else {
                    setDoc(userRef, { favorites: [], playlists: [] });
                }
                renderSidebarPlaylists();
                if(AppState.currentView === 'favorites' || AppState.currentView.startsWith('playlist')) navigate(AppState.currentView);
                updateLikeButtonUI();
            });
        }

        function loadTrendingData() {
            const trendingRef = doc(db, 'artifacts', AppID, 'public', 'data', 'stats', 'global');
            trendingUnsubscribe = onSnapshot(trendingRef, (docSnap) => {
                if (docSnap.exists()) {
                    AppState.trendingStats = docSnap.data().playCounts || {};
                }
                if(AppState.currentView === 'home') renderHome();
            });
        }

        async function saveUserData() {
            if (!AppState.user) return;
            const userRef = doc(db, 'artifacts', AppID, 'users', AppState.user.uid, 'profile', 'data');
            await setDoc(userRef, {
                favorites: AppState.favorites,
                playlists: AppState.playlists
            }, { merge: true });
        }

        async function recordPlay(songId) {
            if (!AppState.user) return;
            const trendingRef = doc(db, 'artifacts', AppID, 'public', 'data', 'stats', 'global');
            try {
                const docSnap = await getDoc(trendingRef);
                if (!docSnap.exists()) {
                    await setDoc(trendingRef, { playCounts: { [songId]: 1 } });
                } else {
                    await updateDoc(trendingRef, { [`playCounts.${songId}`]: increment(1) });
                }
            } catch (err) {}
        }

        // --- Navigation & Rendering ---
        window.navigate = (view, data = null) => {
            AppState.currentView = view;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-white', 'bg-white/5');
                btn.classList.add('text-gray-400');
            });
            event?.currentTarget?.classList?.add('text-white');
            if(window.innerWidth >= 768) event?.currentTarget?.classList?.add('bg-white/5');

            els.contentArea.innerHTML = '';
            document.getElementById('scroll-main').scrollTo(0,0);

            switch (view) {
                case 'home': renderHome(); break;
                case 'search': renderSearch(); break;
                case 'favorites': renderFavorites(); break;
                case 'playlist': renderPlaylistView(data); break;
                case 'settings': renderSettings(); break;
            }
            lucide.createIcons();
        };

        function renderHome() {
            const trending = [...mockSongs].sort((a, b) => (AppState.trendingStats[b.id] || 0) - (AppState.trendingStats[a.id] || 0)).slice(0, 5);
            const newReleases = [...mockSongs].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 4);

            let favGenres = AppState.favorites.map(id => mockSongs.find(s=>s.id===id)?.genre).filter(Boolean);
            let suggested = [];
            if (favGenres.length > 0) {
                const popularGenre = favGenres.sort((a,b) => favGenres.filter(v => v===a).length - favGenres.filter(v => v===b).length).pop();
                suggested = mockSongs.filter(s => s.genre === popularGenre && !AppState.favorites.includes(s.id)).slice(0, 4);
            }
            if (suggested.length === 0) suggested = mockSongs.slice(3, 7);

            const html = `
                <div class="relative w-full h-56 md:h-72 rounded-2xl md:rounded-3xl overflow-hidden glass-card mb-10 group cursor-pointer" onclick="playQueue(${JSON.stringify(trending).replace(/"/g, '&quot;')}, 0)">
                    <div class="absolute inset-0 bg-gradient-to-r from-brand-900/90 via-dark-900/60 to-transparent z-10 flex flex-col justify-center p-6 md:p-10">
                        <span class="text-xs font-bold tracking-widest uppercase text-brand-400 mb-2">Featured Mix</span>
                        <h2 class="text-3xl md:text-5xl font-extrabold text-white mb-3 drop-shadow-lg">Trending Sounds</h2>
                        <p class="text-gray-300 max-w-sm text-sm md:text-base line-clamp-2">The most played tracks across the Aura universe right now.</p>
                        <button class="mt-6 bg-brand-500 hover:bg-brand-400 text-white w-12 h-12 md:w-14 md:h-14 rounded-full flex items-center justify-center shadow-lg transition-transform group-hover:scale-105">
                            <i data-lucide="play" class="w-6 h-6 fill-current ml-1"></i>
                        </button>
                    </div>
                    <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=1200&q=80" class="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-overlay group-hover:scale-105 transition-transform duration-700">
                </div>

                <section>
                    <h3 class="text-xl font-bold mb-5 tracking-tight">Trending Now</h3>
                    <div class="flex overflow-x-auto hide-scrollbar gap-5 pb-4 snap-x">
                        ${trending.map((song, i) => SongCardLarge(song, trending, i)).join('')}
                    </div>
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-4">
                    <section>
                        <h3 class="text-xl font-bold mb-5 tracking-tight">Made For You</h3>
                        <div class="space-y-2">
                            ${suggested.map((song, i) => SongListItem(song, suggested, i)).join('')}
                        </div>
                    </section>
                    <section>
                        <h3 class="text-xl font-bold mb-5 tracking-tight">New Releases</h3>
                        <div class="grid grid-cols-2 gap-4">
                            ${newReleases.map((song, i) => SongCardSmall(song, newReleases, i)).join('')}
                        </div>
                    </section>
                </div>
            `;
            els.contentArea.innerHTML = html;
        }

        function renderSearch() {
            els.contentArea.innerHTML = `
                <div class="sticky top-12 md:top-0 z-10 bg-dark-900/95 backdrop-blur-xl pt-2 pb-6 -mx-5 px-5 md:mx-0 md:px-0">
                    <div class="relative w-full max-w-3xl mx-auto">
                        <i data-lucide="search" class="absolute left-5 top-4 text-gray-400 w-6 h-6"></i>
                        <input type="text" id="search-input" placeholder="What do you want to listen to?" class="w-full bg-dark-800 border border-white/10 rounded-full pl-14 pr-6 py-4 font-medium focus:outline-none focus:border-white/30 focus:bg-dark-700 transition-colors text-white shadow-lg" onkeyup="handleSearch(event)">
                    </div>
                </div>
                <div id="search-results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6">
                    <div class="col-span-full text-center text-gray-500 py-20 font-medium">Browse our entire catalog</div>
                </div>
            `;
        }

        window.handleSearch = (e) => {
            const query = e.target.value.toLowerCase();
            const resultsContainer = document.getElementById('search-results');
            if (!query) {
                resultsContainer.innerHTML = '<div class="col-span-full text-center text-gray-500 py-20 font-medium">Browse our entire catalog</div>';
                return;
            }
            const results = mockSongs.filter(s => s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query) || s.genre.toLowerCase().includes(query));
            if (results.length === 0) {
                resultsContainer.innerHTML = '<div class="col-span-full text-center text-gray-500 py-20 font-medium">No results found for "'+query+'"</div>';
                return;
            }
            resultsContainer.innerHTML = results.map((song, i) => SongCardSmall(song, results, i)).join('');
            lucide.createIcons();
        };

        function renderFavorites() {
            const favSongs = AppState.favorites.map(id => mockSongs.find(s => s.id === id)).filter(Boolean);
            els.contentArea.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-end gap-6 mb-10 mt-4">
                    <div class="w-40 h-40 md:w-56 md:h-56 bg-gradient-to-br from-brand-500 to-brand-900 rounded-xl shadow-2xl flex items-center justify-center">
                        <i data-lucide="heart" class="w-16 h-16 text-white fill-current"></i>
                    </div>
                    <div class="mt-2 md:mt-0">
                        <p class="text-xs font-bold uppercase tracking-[0.15em] text-white/70 mb-1 hidden md:block">Playlist</p>
                        <h2 class="text-4xl md:text-6xl font-black mb-3 tracking-tight">Liked Songs</h2>
                        <div class="flex items-center gap-2 text-sm text-gray-300 font-medium">
                            <img src="${AppState.user.photoURL || `https://ui-avatars.com/api/?name=${AppState.user.email}`}" class="w-6 h-6 rounded-full">
                            <span>${AppState.user.displayName || 'You'}</span>
                            <span class="text-gray-500">•</span>
                            <span>${favSongs.length} songs</span>
                        </div>
                        ${favSongs.length > 0 ? `
                        <button onclick="playQueue(${JSON.stringify(favSongs).replace(/"/g, '&quot;')}, 0)" class="mt-6 bg-brand-500 hover:scale-105 active:scale-95 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-[0_10px_30px_rgba(139,92,246,0.4)] transition-transform">
                            <i data-lucide="play" class="w-6 h-6 fill-current ml-1"></i>
                        </button>` : ''}
                    </div>
                </div>
                <div class="space-y-1 md:space-y-2">
                    ${favSongs.length > 0 ? favSongs.map((song, i) => SongListItem(song, favSongs, i)).join('') : '<div class="text-gray-500 py-10 font-medium">Songs you like will appear here.</div>'}
                </div>
            `;
        }

        function renderPlaylistView(playlistId) {
            const playlist = AppState.playlists.find(p => p.id === playlistId);
            if (!playlist) return;
            const pSongs = playlist.songs.map(id => mockSongs.find(s => s.id === id)).filter(Boolean);
            
            els.contentArea.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-end gap-6 mb-10 mt-4">
                    <div class="w-40 h-40 md:w-56 md:h-56 bg-dark-800 rounded-xl shadow-2xl flex items-center justify-center border border-white/5">
                        <i data-lucide="music" class="w-16 h-16 text-gray-600"></i>
                    </div>
                    <div class="mt-2 md:mt-0">
                        <p class="text-xs font-bold uppercase tracking-[0.15em] text-white/70 mb-1 hidden md:block">Playlist</p>
                        <h2 class="text-4xl md:text-6xl font-black mb-3 tracking-tight">${playlist.name}</h2>
                        <div class="flex items-center gap-2 text-sm text-gray-300 font-medium">
                            <img src="${AppState.user.photoURL || `https://ui-avatars.com/api/?name=${AppState.user.email}`}" class="w-6 h-6 rounded-full">
                            <span>${AppState.user.displayName || 'You'}</span>
                            <span class="text-gray-500">•</span>
                            <span>${pSongs.length} songs</span>
                        </div>
                        <div class="flex items-center gap-4 mt-6">
                            ${pSongs.length > 0 ? `
                            <button onclick="playQueue(${JSON.stringify(pSongs).replace(/"/g, '&quot;')}, 0)" class="bg-brand-500 hover:scale-105 active:scale-95 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-[0_10px_30px_rgba(139,92,246,0.4)] transition-transform">
                                <i data-lucide="play" class="w-6 h-6 fill-current ml-1"></i>
                            </button>` : ''}
                            <button onclick="deletePlaylist('${playlist.id}')" class="p-3 text-gray-400 hover:text-red-500 rounded-full transition-colors">
                                <i data-lucide="trash-2" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="space-y-1 md:space-y-2">
                    ${pSongs.length > 0 ? pSongs.map((song, i) => SongListItem(song, pSongs, i, playlistId)).join('') : '<div class="text-gray-500 py-10 font-medium">Let\'s find some music for your playlist.</div>'}
                </div>
            `;
        }

        function renderSettings() {
            els.contentArea.innerHTML = `
                <div class="max-w-2xl mt-4">
                    <h2 class="text-3xl font-black mb-8 tracking-tight">Account Settings</h2>
                    
                    <div class="glass-panel rounded-2xl p-6 md:p-8 mb-8 border border-white/5 flex items-center gap-6">
                        <img src="${AppState.user.photoURL || `https://ui-avatars.com/api/?name=${AppState.user.email}`}" class="w-20 h-20 md:w-24 md:h-24 rounded-full shadow-lg object-cover">
                        <div>
                            <div class="font-bold text-2xl tracking-tight mb-1">${AppState.user.displayName || 'Aura User'}</div>
                            <div class="text-gray-400 font-medium">${AppState.user.email}</div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <button onclick="handleSignOut()" class="w-full bg-dark-800 hover:bg-dark-700 px-6 py-4 rounded-xl text-left flex items-center justify-between transition-colors border border-white/5 font-semibold">
                            <span>Log Out</span>
                            <i data-lucide="log-out" class="w-5 h-5 text-gray-400"></i>
                        </button>
                        <button onclick="handleDeleteAccount()" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 px-6 py-4 rounded-xl text-left flex items-center justify-between transition-colors border border-red-500/10 font-semibold">
                            <span>Delete Account</span>
                            <i data-lucide="user-x" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // --- UI Components ---
        const SongCardLarge = (song, queue, index) => `
            <div class="min-w-[150px] md:min-w-[180px] snap-center group cursor-pointer" onclick="playQueue(${JSON.stringify(queue).replace(/"/g, '&quot;')}, ${index})">
                <div class="relative overflow-hidden rounded-xl mb-4 shadow-lg bg-dark-800 aspect-square">
                    <img src="${song.cover}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                        <div class="w-12 h-12 bg-brand-500 rounded-full flex items-center justify-center shadow-lg translate-y-4 group-hover:translate-y-0 transition-all duration-300">
                            <i data-lucide="play" class="w-6 h-6 text-white fill-current ml-1"></i>
                        </div>
                    </div>
                </div>
                <h4 class="font-bold text-sm md:text-base text-white truncate mb-1">${song.title}</h4>
                <p class="text-xs md:text-sm text-gray-400 truncate font-medium">${song.artist}</p>
            </div>
        `;

        const SongCardSmall = (song, queue, index) => `
            <div class="bg-dark-800/50 hover:bg-dark-700/80 p-3 rounded-xl flex items-center gap-4 transition-colors group cursor-pointer border border-transparent hover:border-white/5" onclick="playQueue(${JSON.stringify(queue).replace(/"/g, '&quot;')}, ${index})">
                <div class="relative w-14 h-14 rounded-md overflow-hidden shrink-0">
                    <img src="${song.cover}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                         <i data-lucide="play" class="w-5 h-5 text-white fill-current ml-0.5"></i>
                    </div>
                </div>
                <div class="flex-1 overflow-hidden">
                    <h4 class="font-bold text-sm text-white truncate mb-0.5">${song.title}</h4>
                    <p class="text-xs text-gray-400 font-medium truncate">${song.artist}</p>
                </div>
                <button class="p-2 opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.stopPropagation(); openPlaylistModal('${song.id}')">
                    <i data-lucide="more-horizontal" class="w-5 h-5 text-gray-400 hover:text-white"></i>
                </button>
            </div>
        `;

        const SongListItem = (song, queue, index, playlistId = null) => `
            <div class="flex items-center gap-4 p-2 md:p-3 rounded-xl hover:bg-white/5 transition-colors group cursor-pointer" onclick="playQueue(${JSON.stringify(queue).replace(/"/g, '&quot;')}, ${index})">
                <div class="w-6 md:w-8 text-center text-gray-400 text-sm font-medium hidden md:block group-hover:hidden">${index + 1}</div>
                <div class="w-6 md:w-8 text-center text-white text-sm hidden group-hover:block md:group-hover:block"><i data-lucide="play" class="w-4 h-4 fill-current mx-auto"></i></div>
                
                <img src="${song.cover}" class="w-12 h-12 rounded-md object-cover bg-dark-800">
                <div class="flex-1 overflow-hidden">
                    <h4 class="font-bold text-sm text-white truncate mb-0.5">${song.title}</h4>
                    <p class="text-xs text-gray-400 font-medium truncate">${song.artist}</p>
                </div>
                <div class="text-xs text-gray-400 font-medium hidden md:block w-32 truncate">${song.genre}</div>
                
                <div class="flex items-center gap-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                    <button class="p-2.5" onclick="event.stopPropagation(); window.toggleFavorite('${song.id}')">
                        <i data-lucide="heart" class="w-5 h-5 ${AppState.favorites.includes(song.id) ? 'text-brand-500 fill-current' : 'text-gray-400 hover:text-white'} transition-colors"></i>
                    </button>
                    ${playlistId ? `
                    <button class="p-2.5 text-gray-400 hover:text-red-400" onclick="event.stopPropagation(); removeFromPlaylist('${song.id}', '${playlistId}')" title="Remove">
                        <i data-lucide="minus-circle" class="w-5 h-5"></i>
                    </button>` : `
                    <button class="p-2.5 text-gray-400 hover:text-white" onclick="event.stopPropagation(); openPlaylistModal('${song.id}')" title="Add to Playlist">
                        <i data-lucide="more-horizontal" class="w-5 h-5"></i>
                    </button>`}
                </div>
            </div>
        `;

        // --- Playlists Logic ---
        function renderSidebarPlaylists() {
            els.sidebarPlaylists.innerHTML = AppState.playlists.map(p => `
                <button onclick="navigate('playlist', '${p.id}')" class="w-full text-left px-4 py-2 text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 rounded-lg truncate transition-colors">
                    ${p.name}
                </button>
            `).join('');
        }

        window.createNewPlaylist = async (name = null) => {
            if(!name) name = prompt("Enter playlist name:");
            if(name && name.trim()) {
                const newPlaylist = { id: 'pl_' + Date.now(), name: name.trim(), songs: [] };
                AppState.playlists.push(newPlaylist);
                await saveUserData();
                renderSidebarPlaylists();
            }
        };

        window.deletePlaylist = async (id) => {
            if(confirm("Delete this playlist?")) {
                AppState.playlists = AppState.playlists.filter(p => p.id !== id);
                await saveUserData();
                renderSidebarPlaylists();
                navigate('home');
            }
        };

        window.openPlaylistModal = (songId) => {
            AppState.songToPlaylistId = songId;
            const content = document.getElementById('modal-content');
            if (AppState.playlists.length === 0) {
                content.innerHTML = '<p class="text-sm text-gray-400 font-medium">No playlists found. Create one below.</p>';
            } else {
                content.innerHTML = AppState.playlists.map(p => `
                    <button onclick="addToPlaylist('${p.id}')" class="w-full text-left px-4 py-3.5 rounded-xl bg-dark-900/50 hover:bg-dark-700 font-medium text-sm transition-colors flex justify-between items-center border border-transparent hover:border-white/5">
                        ${p.name}
                        ${p.songs.includes(songId) ? '<i data-lucide="check" class="w-5 h-5 text-brand-500"></i>' : ''}
                    </button>
                `).join('');
            }
            els.playlistModal.classList.remove('hidden');
            lucide.createIcons();
        };

        window.closeModal = () => {
            els.playlistModal.classList.add('hidden');
            document.getElementById('new-playlist-input').value = '';
        };

        window.handleCreatePlaylist = async () => {
            const input = document.getElementById('new-playlist-input');
            if(input.value.trim()) {
                await createNewPlaylist(input.value);
                openPlaylistModal(AppState.songToPlaylistId);
                input.value = '';
            }
        };

        window.addToPlaylist = async (playlistId) => {
            const songId = AppState.songToPlaylistId;
            const pl = AppState.playlists.find(p => p.id === playlistId);
            if(pl) {
                if(!pl.songs.includes(songId)) pl.songs.push(songId);
                else pl.songs = pl.songs.filter(id => id !== songId);
                await saveUserData();
                closeModal();
            }
        };

        window.removeFromPlaylist = async (songId, playlistId) => {
            const pl = AppState.playlists.find(p => p.id === playlistId);
            if(pl) {
                pl.songs = pl.songs.filter(id => id !== songId);
                await saveUserData();
                if(AppState.currentView === 'playlist') renderPlaylistView(playlistId);
            }
        };

        window.toggleFavorite = async (songId) => {
            const idx = AppState.favorites.indexOf(songId);
            if (idx > -1) AppState.favorites.splice(idx, 1);
            else AppState.favorites.push(songId);
            
            await saveUserData();
            
            if(AppState.currentView === 'home') renderHome();
            if(AppState.currentView === 'favorites') renderFavorites();
            if(AppState.currentView === 'playlist') navigate('playlist', document.querySelector('h2').innerText);
            if(AppState.currentView === 'search') handleSearch({target: document.getElementById('search-input')});

            if(AppState.queue[AppState.currentIndex]?.id === songId) {
                updateLikeButtonUI();
            }
            lucide.createIcons();
        };

        window.toggleCurrentFavorite = (e) => {
            e.stopPropagation();
            const currentSong = AppState.queue[AppState.currentIndex];
            if(currentSong) toggleFavorite(currentSong.id);
        };

        // --- Player Controls & UI Sync ---
        window.playQueue = (queue, index) => {
            AppState.queue = queue;
            AppState.currentIndex = index;
            loadSong();
        };

        function loadSong() {
            const song = AppState.queue[AppState.currentIndex];
            if (!song) return;

            // Show players
            els.desktopPlayer.classList.remove('player-hidden');
            els.mobileMiniPlayer.classList.remove('player-hidden');
            
            // Sync Text/Images across ALL DOM instances via class
            document.querySelectorAll('.js-track-title').forEach(el => el.innerText = song.title);
            document.querySelectorAll('.js-track-artist').forEach(el => el.innerText = song.artist);
            document.querySelectorAll('.js-cover-art').forEach(el => el.src = song.cover);
            
            // App Background Glow (Desktop context)
            document.documentElement.style.setProperty('--glow-color', `${song.color}30`);
            
            // Mobile Full Player specific background mapping
            const mfpBg = document.getElementById('mfp-bg');
            mfpBg.style.background = `linear-gradient(to bottom, ${song.color}80, #121212 80%)`;

            // Setup Context Text
            let contextText = "PLAYING FROM AURA";
            if(AppState.currentView === 'playlist') contextText = "PLAYING FROM PLAYLIST";
            else if(AppState.currentView === 'favorites') contextText = "PLAYING FROM LIKED SONGS";
            document.getElementById('mfp-context').innerText = contextText;

            updateLikeButtonUI();

            // Audio Playback
            AppState.audio.src = song.src;
            AppState.audio.play().catch(e => console.error(e));
            recordPlay(song.id);
        }

        window.togglePlay = (e) => {
            if(e) e.stopPropagation();
            if (!AppState.audio.src) return;
            if (AppState.isPlaying) AppState.audio.pause();
            else AppState.audio.play();
        };

        function updatePlayButtonUI() {
            const icon = AppState.isPlaying ? 'pause' : 'play';
            ['desktop-play-icon', 'mini-play-icon', 'mfp-play-icon'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.setAttribute('data-lucide', icon);
                    // Slight margin adjustment for optical centering of play vs pause
                    if(icon === 'play') el.classList.add('ml-1');
                    else el.classList.remove('ml-1');
                }
            });
            lucide.createIcons();
        }

        function updateLikeButtonUI() {
            const song = AppState.queue[AppState.currentIndex];
            const isFav = song && AppState.favorites.includes(song.id);
            
            ['desktop-like-icon', 'mini-like-icon', 'mfp-like-icon'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    if (isFav) {
                        el.classList.add('text-brand-500', 'fill-current');
                        el.classList.remove('text-gray-400', 'text-white/70');
                    } else {
                        el.classList.remove('text-brand-500', 'fill-current');
                        if (id === 'mfp-like-icon') el.classList.add('text-white/70');
                        else el.classList.add('text-gray-400');
                    }
                }
            });
        }

        window.playNext = (e) => {
            if(e) e.stopPropagation();
            if (AppState.queue.length === 0) return;
            
            if (AppState.isShuffle) {
                AppState.currentIndex = Math.floor(Math.random() * AppState.queue.length);
            } else {
                AppState.currentIndex = (AppState.currentIndex + 1) % AppState.queue.length;
            }
            loadSong();
        };

        window.playPrev = (e) => {
            if(e) e.stopPropagation();
            if (AppState.queue.length === 0) return;
            
            if (AppState.audio.currentTime > 3) {
                AppState.audio.currentTime = 0;
            } else {
                AppState.currentIndex = (AppState.currentIndex - 1 + AppState.queue.length) % AppState.queue.length;
                loadSong();
            }
        };

        function handleSongEnd() {
            if (AppState.isRepeat) {
                AppState.audio.currentTime = 0;
                AppState.audio.play();
            } else {
                playNext();
            }
        }

        window.toggleShuffle = (e) => {
            if(e) e.stopPropagation();
            AppState.isShuffle = !AppState.isShuffle;
            ['desktop-shuffle', 'mfp-shuffle'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.classList.toggle('text-brand-500', AppState.isShuffle);
                    if(id==='desktop-shuffle') el.classList.toggle('text-gray-400', !AppState.isShuffle);
                    if(id==='mfp-shuffle') el.classList.toggle('text-white/70', !AppState.isShuffle);
                }
            });
        };

        window.toggleRepeat = (e) => {
            if(e) e.stopPropagation();
            AppState.isRepeat = !AppState.isRepeat;
            ['desktop-repeat', 'mfp-repeat'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.classList.toggle('text-brand-500', AppState.isRepeat);
                    if(id==='desktop-repeat') el.classList.toggle('text-gray-400', !AppState.isRepeat);
                    if(id==='mfp-repeat') el.classList.toggle('text-white/70', !AppState.isRepeat);
                }
            });
        };

        function updateProgressUI() {
            const { duration, currentTime } = AppState.audio;
            if (isNaN(duration)) return;
            
            const progressPercent = (currentTime / duration) * 100;
            
            // Desktop Slider Sync
            const dProg = document.getElementById('desktop-progress');
            if(dProg && document.activeElement !== dProg) dProg.value = progressPercent;
            document.getElementById('desktop-time-current').innerText = formatTime(currentTime);
            document.getElementById('desktop-time-total').innerText = formatTime(duration);
            
            // Mobile Mini Slider Sync
            const mMini = document.getElementById('mini-progress-fill');
            if(mMini) mMini.style.width = `${progressPercent}%`;

            // Mobile Full Slider Sync
            const mFull = document.getElementById('mfp-progress');
            if(mFull && document.activeElement !== mFull) {
                mFull.value = progressPercent;
                document.getElementById('mfp-progress-fill').style.width = `${progressPercent}%`;
                document.getElementById('mfp-progress-thumb').style.left = `${progressPercent}%`;
            }
            document.getElementById('mfp-time-current').innerText = formatTime(currentTime);
            document.getElementById('mfp-time-total').innerText = formatTime(duration);
        }

        window.updateMfpScrubberUI = (e) => {
            const val = e.target.value;
            document.getElementById('mfp-progress-fill').style.width = `${val}%`;
            document.getElementById('mfp-progress-thumb').style.left = `${val}%`;
        };

        window.seekAudio = (e) => {
            const seekTime = (e.target.value / 100) * AppState.audio.duration;
            AppState.audio.currentTime = seekTime;
        };

        window.setVolume = (e) => {
            AppState.audio.volume = e.target.value;
        };

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        // --- Mobile Full Screen Overlay Gestures & Toggles ---
        window.expandPlayer = () => {
            els.mobileFullPlayer.style.transform = 'translateY(0)';
        };

        window.collapsePlayer = () => {
            els.mobileFullPlayer.style.transform = 'translateY(100%)';
        };

        // Smooth Swipe Down to Dismiss logic
        let touchStartX = 0;
        let touchStartY = 0;
        let touchCurrentX = 0;
        let touchCurrentY = 0;
        let isHorizontalSwipe = false;
        let isVerticalSwipe = false;
        
        els.mobileFullPlayer.addEventListener('touchstart', e => {
            // Prevent drag if touching scrubbers or buttons
            if(e.target.tagName.toLowerCase() === 'input' || e.target.closest('button')) return; 
            
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            isHorizontalSwipe = false;
            isVerticalSwipe = false;
            
            els.mobileFullPlayer.style.transition = 'none'; 
            const cover = document.getElementById('mfp-cover-art');
            if(cover) cover.style.transition = 'none'; 
        }, {passive: true});
        
        els.mobileFullPlayer.addEventListener('touchmove', e => {
            if(e.target.tagName.toLowerCase() === 'input' || e.target.closest('button')) return;
            
            touchCurrentX = e.touches[0].clientX;
            touchCurrentY = e.touches[0].clientY;
            
            const deltaX = touchCurrentX - touchStartX;
            const deltaY = touchCurrentY - touchStartY;

            // Determine dominant axis once per gesture
            if (!isHorizontalSwipe && !isVerticalSwipe) {
                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 10) {
                    isHorizontalSwipe = true;
                } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 10) {
                    isVerticalSwipe = true;
                }
            }

            if (isVerticalSwipe && deltaY > 0) { 
                // Vertical drag to dismiss
                els.mobileFullPlayer.style.transform = `translateY(${deltaY}px)`;
            } else if (isHorizontalSwipe) {
                // Horizontal drag on cover art for physical feedback
                const cover = document.getElementById('mfp-cover-art');
                if(cover) cover.style.transform = `translateX(${deltaX * 0.6}px)`;
            }
        }, {passive: true});
        
        els.mobileFullPlayer.addEventListener('touchend', e => {
            if(e.target.tagName.toLowerCase() === 'input' || e.target.closest('button')) return;
            
            els.mobileFullPlayer.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            const cover = document.getElementById('mfp-cover-art');

            const deltaX = touchCurrentX - touchStartX;
            const deltaY = touchCurrentY - touchStartY;
            
            if (isVerticalSwipe) {
                if (deltaY > 120) {
                    collapsePlayer();
                } else {
                    els.mobileFullPlayer.style.transform = 'translateY(0)'; // Snap back up
                }
            } else if (isHorizontalSwipe) {
                if (Math.abs(deltaX) > 70) { // Swipe threshold
                    animateSwipe(deltaX < 0 ? 'next' : 'prev');
                } else {
                    if(cover) {
                        cover.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                        cover.style.transform = 'translateX(0)';
                    }
                }
            }
        });

        // Fast, hardware-accelerated left/right swipe animations
        window.animateSwipe = (direction) => {
            const cover = document.getElementById('mfp-cover-art');
            if(!cover) {
                direction === 'next' ? playNext() : playPrev();
                return;
            }

            // Animate out swiftly
            cover.style.transition = 'transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.15s ease-out';
            cover.style.transform = direction === 'next' ? 'translateX(-120%)' : 'translateX(120%)';
            cover.style.opacity = '0';
            
            setTimeout(() => {
                // Change song logic
                if (direction === 'next') playNext();
                else playPrev();
                
                // Reposition cover art to opposite side invisibly
                cover.style.transition = 'none';
                cover.style.transform = direction === 'next' ? 'translateX(120%)' : 'translateX(-120%)';
                
                // Allow browser to render position change, then slide in
                setTimeout(() => {
                    cover.style.transition = 'transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease-in';
                    cover.style.transform = 'translateX(0)';
                    cover.style.opacity = '1';
                }, 20); 
            }, 150); // Matches out-animation speed
        };

        // --- User Actions ---
        window.handleSignOut = () => {
            signOut(auth);
            if(trendingUnsubscribe) trendingUnsubscribe();
            if(userUnsubscribe) userUnsubscribe();
        };

        window.handleDeleteAccount = async () => {
            if(confirm("WARNING: This will permanently delete your account. Proceed?")) {
                try {
                    await deleteUser(auth.currentUser);
                    alert("Account deleted.");
                    window.location.reload();
                } catch(err) {
                    alert("Failed to delete account. You may need to sign in again recently.");
                }
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
